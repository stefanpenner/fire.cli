\* Mutation check: the FIRST fix (apply if for the current view). It stops
\* cross-view staleness but NOT two same-view reloads arriving out of order,
\* which live auto-refresh produces. Expect Coherent to FAIL — this is why the
\* code needs the per-view generation (seq), not view-match alone.
CONSTANTS
    Views = {"dev", "rules"}
    MaxGen = 2
    Guard = "viewmatch"
SPECIFICATION Spec
INVARIANTS
    TypeOK
    Coherent
